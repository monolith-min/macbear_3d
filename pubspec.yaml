name: macbear_3d
description: "Macbear 3D is a lightweight 3D rendering engine for Flutter, built on Google ANGLE (OpenGL ES)."
version: 0.8.0
homepage: https://macbear-globe.blogspot.com/
repository: https://github.com/macbearchen/macbear_3d
documentation: https://macbearchen.github.io/macbear_3d/
topics:
  - angle
  - opengl
  - glsl
  - gltf
  - macbear

screenshots:
  - description: 'Macbear 3D Engine'
    path: uml/logo.png

environment:
  sdk: ^3.10.0
  flutter: ">=1.17.0"

dependencies:
  ffi: ^2.2.0
  build: ^2.0.0
  flutter:
    sdk: flutter
  flutter_angle: ^0.3.9
  http: ^1.6.0
  oimo_physics: ^0.0.4
  vector_math: ^2.2.0
  web: ^1.1.1
  video_player: ^2.11.1
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        package: com.macbear.m3_video_bridge
        pluginClass: M3VideoBridgePlugin
      macos:
        pluginClass: M3VideoBridgePlugin
      ios:
        pluginClass: M3VideoBridgePlugin
      web:
        pluginClass: M3VideoBridgePlugin
        fileName: src/video_bridge/video_bridge.dart
      windows:
        pluginClass: M3VideoBridgePlugin

  assets:
    - assets/fonts/RobotoMono/

  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono/RobotoMono-Regular.ttf

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
